services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env        # 必须先创建（见 backend/.env.example）
    volumes:
      - v2-data:/opt/jianzhen-v2/data
    expose:
      - "8848"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8080:80"             # 对外访问端口；改成 80:80 可用默认端口
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  v2-data:
