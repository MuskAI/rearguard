server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    return 444;
}

server {
    listen 127.0.0.1:8081;
    server_name localhost;

    root /var/www/realguard-frontend;
    index index.html;

    client_max_body_size 2m;

    include /etc/nginx/snippets/realguard-security-server.conf;
    include /etc/nginx/snippets/realguard-umami-tracking.conf;
    error_page 429 = @realguard_rate_limited;

    location @realguard_rate_limited {
        include /etc/nginx/snippets/realguard-security-headers.conf;
        default_type application/json;
        add_header Retry-After "2" always;
        add_header Cache-Control "no-store" always;
        return 429 '{"status":"error","code":"rate_limited","message":"请求过于频繁，请稍后重试"}';
    }

    location ^~ /.well-known/acme-challenge/ {
        default_type text/plain;
        try_files $uri =404;
        access_log off;
    }

    location = /index.html {
        include /etc/nginx/snippets/realguard-security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /v2/index.html {
        root /var/www;
        include /etc/nginx/snippets/realguard-security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location /assets/ {
        try_files $uri =404;
        access_log off;
        include /etc/nginx/snippets/realguard-security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /v2/assets/ {
        root /var/www;
        try_files $uri =404;
        access_log off;
        include /etc/nginx/snippets/realguard-security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location = /developer/API.md {
        return 404;
    }

    location = /skills/realguard-forensics/SKILL.md {
        return 404;
    }

    location = /v2/skills/realguard-forensics/SKILL.md {
        return 404;
    }

    location ^~ /detection-static/ {
        return 404;
    }

    location = /v2 {
        return 301 /v2/;
    }

    location ~ ^/v2-api/(detect|forensics|provenance)$ {
        include /etc/nginx/snippets/realguard-upload-proxy-security.conf;
        client_max_body_size 26m;
        rewrite ^/v2-api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:8848;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location ~ ^/v2-api/report/[^/]+/public$ {
        access_log off;
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        include /etc/nginx/snippets/realguard-public-report-headers.conf;
        rewrite ^/v2-api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:8848;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/v2-api/report/[^/]+/public/evidence-package$ {
        access_log off;
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        include /etc/nginx/snippets/realguard-public-report-headers.conf;
        rewrite ^/v2-api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:8848;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v2-api/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:8848/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /v2/ {
        root /var/www;
        try_files $uri $uri/ /v2/index.html;
        include /etc/nginx/snippets/realguard-security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /admin {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin/screen {
        access_log off;
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /admin/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(login|register|login_verify|login_sms_verify|password_reset_verify|register_verify|logout)$ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
        include /etc/nginx/snippets/realguard-security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location = /api/openapi/v1/image-detections {
        include /etc/nginx/snippets/realguard-upload-proxy-security.conf;
        client_max_body_size 26m;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /sms/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/image_upload/(detect|detect_async|detect_swarm)$ {
        include /etc/nginx/snippets/realguard-upload-proxy-security.conf;
        client_max_body_size 26m;
        proxy_pass http://127.0.0.1:5000;
        proxy_read_timeout 180s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /image_upload/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_read_timeout 180s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /video_upload/detect {
        include /etc/nginx/snippets/realguard-upload-proxy-security.conf;
        client_max_body_size 257m;
        proxy_pass http://127.0.0.1:5000;
        proxy_read_timeout 180s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /video_upload/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_read_timeout 180s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(retrieve|image_retrieve|video_retrieve|history_image_retrieve|history_video_retrieve|history_retrieve|retrieve_result)(/|$) {
        return 404;
    }

    location ^~ /static/uploads/ {
        return 404;
    }

    location /static/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
