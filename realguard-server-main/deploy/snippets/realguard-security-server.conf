# Shared server-level hardening for RealGuard HTTP entrypoints.
limit_conn realguard_conn 30;
limit_req zone=realguard_general burst=80 nodelay;

client_header_timeout 20s;
client_body_timeout 120s;
send_timeout 120s;

include /etc/nginx/snippets/realguard-security-headers.conf;

location ^~ /v2/. {
    deny all;
    access_log off;
    log_not_found off;
}

location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
}

location ~* \.(?:env|ini|log|sql|bak|backup|old|orig|swp|yml|yaml|toml|lock)$ {
    deny all;
    access_log off;
    log_not_found off;
}
