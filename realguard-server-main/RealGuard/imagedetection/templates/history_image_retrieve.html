<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字内容侵权、分析、检索和存证综合平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="/static/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root{--primary:#2563eb;--accent:#06d6a0;--bg-body:#f0f2f5;--bg-card:#fff;--bg-nav:rgba(255,255,255,.82);--bg-input:#f1f5f9;--border:#e2e8f0;--border-light:rgba(0,0,0,.06);--text-primary:#0f172a;--text-secondary:#475569;--text-muted:#94a3b8;--shadow-md:0 4px 12px rgba(0,0,0,.08);--shadow-card:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04)}
        [data-theme="dark"]{--bg-body:#0b0f1a;--bg-card:#151b2e;--bg-nav:rgba(15,23,42,.85);--bg-input:#1e293b;--border:#1e293b;--border-light:rgba(255,255,255,.06);--text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#64748b;--shadow-md:0 4px 12px rgba(0,0,0,.4);--shadow-card:0 1px 3px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.15)}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:'Outfit','Noto Sans SC',sans-serif;background:var(--bg-body);color:var(--text-primary);transition:background .4s,color .4s;min-height:100vh;display:flex;flex-direction:column}a{text-decoration:none;color:inherit}
        .nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg-nav);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid var(--border-light);transition:all .3s}.nav-inner{max-width:1280px;margin:0 auto;padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between}.nav-logo{display:flex;align-items:center;gap:10px;font-size:1.2rem;font-weight:700;color:var(--text-primary)}.nav-logo i{color:var(--primary);font-size:1.5rem}.nav-links{display:flex;align-items:center;gap:2rem}.nav-links a{font-size:.9rem;font-weight:500;color:var(--text-secondary);transition:color .2s}.nav-links a:hover,.nav-links a.active{color:var(--primary)}
        .theme-btn{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--bg-input);border:1px solid var(--border);cursor:pointer;transition:all .2s;color:var(--text-secondary);font-size:1rem}.theme-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
        .main{flex:1;padding-top:88px;padding-bottom:3rem}.container{max-width:960px;margin:0 auto;padding:0 2rem}
        .back-link{display:inline-flex;align-items:center;gap:6px;font-size:.85rem;font-weight:500;color:var(--text-muted);margin-bottom:1.2rem;transition:color .2s}.back-link:hover{color:var(--primary)}
        .page-header{margin-bottom:1.5rem}.page-header h1{font-size:1.4rem;font-weight:700;color:var(--text-primary);margin-bottom:.2rem;display:flex;align-items:center;gap:10px}.page-header h1 i{color:var(--accent)}.page-header p{font-size:.85rem;color:var(--text-secondary)}
        .card{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:1.25rem;box-shadow:var(--shadow-card)}
        .empty-state{text-align:center;padding:4rem 0;color:var(--text-muted)}.empty-state i{font-size:3rem;margin-bottom:1rem;display:block}
        .record-list{display:flex;flex-direction:column;gap:.6rem}
        .record-item{display:flex;align-items:center;gap:.8rem;padding:.75rem .85rem;border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;background:var(--bg-card)}
        .record-item:hover{border-color:var(--primary);box-shadow:var(--shadow-md);transform:translateX(3px)}
        .r-thumb{width:50px;height:50px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--bg-input)}.r-thumb img{width:100%;height:100%;object-fit:cover;display:block}
        .r-body{flex:1;min-width:0}.r-body .r-title{font-size:.8rem;font-weight:600;color:var(--text-primary);margin-bottom:.1rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .r-body .r-meta{font-size:.7rem;color:var(--text-muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
        .r-badge{padding:1px 7px;border-radius:99px;font-size:.6rem;font-weight:600;background:rgba(6,214,160,.1);color:var(--accent)}
        .r-arrow{color:var(--text-muted);font-size:.65rem;transition:transform .2s;flex-shrink:0}.record-item:hover .r-arrow{transform:translateX(3px);color:var(--primary)}
        .pagination{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:1.2rem}
        .page-btn{min-width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);font-size:.78rem;cursor:pointer;font-family:inherit;transition:all .2s}.page-btn:hover{border-color:var(--primary);color:var(--primary)}.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}.page-btn:disabled{opacity:.4;cursor:not-allowed}
        .footer{padding:1.5rem 0;background:var(--bg-card);border-top:1px solid var(--border);text-align:center;transition:all .4s;margin-top:auto}.footer-logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:.4rem;font-size:.95rem;font-weight:700;color:var(--text-primary)}.footer-logo i{color:var(--primary)}.footer-copy{font-size:.7rem;color:var(--text-muted)}
    </style>
</head>
<body>
<header class="nav"><div class="nav-inner"><a href="/index" class="nav-logo"><i class="fa fa-eye"></i><span>
数字内容侵权、分析、检索和存证综合平台</span></a><nav class="nav-links"><a href="/index">首页</a><a href="/introduce">关于我们</a><a href="/profile" class="active">我的</a><button class="theme-btn" id="themeToggle"><i class="fa fa-moon-o"></i></button></nav></div></header>
<main class="main"><div class="container">
    <a href="/profile" class="back-link"><i class="fa fa-arrow-left"></i> 返回个人中心</a>
    <div class="page-header"><h1><i class="fa fa-search"></i> 图像侵权检索</h1><p>共 {{ records|length }} 条记录，点击查看完整侵权检索结果</p></div>
    <div class="card">
        {% if records|length == 0 %}
        <div class="empty-state"><i class="fa fa-inbox"></i><p>暂无图像侵权检索记录</p><p style="font-size:.82rem;margin-top:.5rem"><a href="/image_retrieve" style="color:var(--primary);font-weight:600">去检索疑似侵权图像</a></p></div>
        {% else %}
        <div class="record-list" id="recordList"></div>
        <div class="pagination" id="pag"></div>
        {% endif %}
    </div>
</div></main>
<footer class="footer"><div class="footer-logo"><i class="fa fa-eye"></i> 数字内容侵权、分析、检索和存证综合平台</div><p class="footer-copy">&copy; 2025 数字内容侵权、分析、检索和存证综合平台</p></footer>
<script>
(function(){
    var b=document.body,t=document.getElementById('themeToggle'),ti=t.querySelector('i');
    function setTheme(d){if(d){b.setAttribute('data-theme','dark');ti.className='fa fa-sun-o';}else{b.removeAttribute('data-theme');ti.className='fa fa-moon-o';}}
    var s=localStorage.getItem('theme');if(s==='dark'||(!s&&window.matchMedia('(prefers-color-scheme:dark)').matches))setTheme(true);
    t.addEventListener('click',function(){var d=b.hasAttribute('data-theme');setTheme(!d);localStorage.setItem('theme',d?'light':'dark');});
    var all=[{% for r in records %}{id:{{ r.itemid }},fn:"{{ r.filename }}",url:"{{ r.file_url }}",cnt:{{ r.result_count }},sz:"{{ r.file_size }}",t:"{{ r.createtime }}"}{% if not loop.last %},{% endif %}{% endfor %}];
    if(!all.length)return;
    var PP=10,cp=1,list=document.getElementById('recordList'),pw=document.getElementById('pag');
    function render(){
        var tp=Math.ceil(all.length/PP),st=(cp-1)*PP,items=all.slice(st,st+PP);list.innerHTML='';
        items.forEach(function(r){
            var d=document.createElement('div');d.className='record-item';
            d.onclick=function(){location.href='/retrieve_result?itemid='+r.id;};
            d.innerHTML='<div class="r-thumb"><img src="'+r.url+'" onerror="this.parentElement.innerHTML=\'<div style=display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:var(--text-muted)><i class=fa\\ fa-picture-o></i></div>\'"></div><div class="r-body"><div class="r-title">'+r.fn+'</div><div class="r-meta"><span class="r-badge"><i class="fa fa-list"></i> '+r.cnt+'条相似结果</span><span>'+r.sz+'</span><span>'+r.t+'</span></div></div><i class="fa fa-chevron-right r-arrow"></i>';
            list.appendChild(d);
        });
        pw.innerHTML='';if(tp<=1)return;
        mk('<i class="fa fa-chevron-left"></i>',cp>1,function(){cp--;render();});
        var pn=pgN(cp,tp);pn.forEach(function(p){
            if(p==='...'){var e=document.createElement('span');e.style.cssText='color:var(--text-muted);padding:0 3px;font-size:.78rem';e.textContent='…';pw.appendChild(e);}
            else mk(p,true,function(){cp=p;render();},p===cp);
        });
        mk('<i class="fa fa-chevron-right"></i>',cp<tp,function(){cp++;render();});
    }
    function mk(h,en,fn,ac){var b=document.createElement('button');b.className='page-btn'+(ac?' active':'');b.innerHTML=h;b.disabled=!en;b.onclick=fn;pw.appendChild(b);}
    function pgN(c,t){if(t<=7){var a=[];for(var i=1;i<=t;i++)a.push(i);return a;}if(c<=3)return[1,2,3,4,'...',t];if(c>=t-2)return[1,'...',t-3,t-2,t-1,t];return[1,'...',c-1,c,c+1,'...',t];}
    render();
})();
</script>
</body>
</html>
