<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>慧鉴 AI 运营大屏</title>
  <link rel="icon" href="data:,">
  <style>
    :root{--bg:#10130f;--panel:#181d17;--panel-2:#20261d;--ink:#f4f7ef;--muted:#a8b3a2;--line:#323b2f;--green:#66d37e;--cyan:#3fd5c0;--amber:#f1bf5a;--red:#f76f6f;--radius:8px}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:#0d1211;color:var(--ink);font-family:"IBM Plex Sans","Noto Sans SC",system-ui,sans-serif;letter-spacing:0}
    .screen{height:100vh;min-height:860px;overflow:hidden;padding:20px;display:grid;grid-template-rows:auto auto auto minmax(0,1fr) auto;gap:12px}
    .top{display:flex;align-items:center;justify-content:space-between;gap:18px;border-bottom:1px solid var(--line);padding-bottom:14px}
    .brand{display:flex;align-items:center;gap:14px}
    .mark{width:44px;height:44px;border-radius:8px;background:var(--green);color:#071008;display:grid;place-items:center;font-weight:1000}
    h1{font-size:30px;margin:0 0 4px}
    .sub{color:var(--muted);font-size:13px}
    .clock{font-family:"IBM Plex Mono",ui-monospace,monospace;text-align:right}
    .clock strong{display:block;font-size:24px;color:var(--green)}
    .clock-meta{display:flex;justify-content:flex-end;align-items:center;gap:10px;margin-top:4px;color:var(--muted);font-size:12px}
    .connection{display:inline-flex;align-items:center;gap:6px;color:var(--amber)}
    .connection:before{content:"";width:7px;height:7px;border-radius:50%;background:currentColor}
    .connection.ok{color:var(--green)}
    .connection.error{color:var(--red)}
    .metrics{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:12px}
    .metric,.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius)}
    .metric{padding:14px 15px;min-height:96px;display:flex;flex-direction:column;justify-content:space-between}
    .metric span{color:var(--muted);font-size:12px}
    .metric strong{font-size:32px;line-height:1;font-family:"IBM Plex Mono",ui-monospace,monospace}
    .metric small{color:var(--green)}
    .runtime{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));border:1px solid var(--line);border-radius:var(--radius);background:#121716;overflow:hidden}
    .runtime-item{padding:11px 14px;border-right:1px solid var(--line);min-width:0}
    .runtime-item:last-child{border-right:0}
    .runtime-item span{display:block;color:var(--muted);font-size:11px;margin-bottom:5px}
    .runtime-item strong{display:block;font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .meter{height:3px;margin-top:8px;background:#29312d;overflow:hidden}
    .meter i{display:block;height:100%;background:var(--green)}
    .meter i.warn{background:var(--amber)}
    .meter i.critical{background:var(--red)}
    .meter.neutral{opacity:.35}
    .grid{min-height:0;display:grid;grid-template-columns:repeat(6,minmax(0,1fr));grid-template-rows:minmax(260px,1.15fr) minmax(210px,.85fr);gap:12px}
    .trend-panel{grid-column:span 4}
    .model-side{grid-column:span 2}
    .anomaly-panel,.distribution-panel,.recent-panel{grid-column:span 2}
    .panel{padding:14px;min-width:0;min-height:0;overflow:hidden}
    .panel-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
    .panel h2{font-size:16px;margin:0}
    .badge{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:999px;padding:5px 9px;color:var(--muted);font-size:12px}
    .badge:before{content:"";width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 14px var(--green)}
    .canvas-wrap{height:calc(100% - 36px);min-height:0}
    canvas{width:100%;height:100%;display:block}
    .side{display:grid;grid-template-rows:minmax(0,1.3fr) minmax(0,.7fr);gap:12px;min-height:0}
    .models{display:grid;gap:5px;overflow:auto;height:calc(100% - 36px)}
    .model,.recent-row{border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.03);min-width:0}
    .model{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:2px 8px}
    .model strong{font-size:14px;line-height:1.2}
    .model strong,.recent-row strong{display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .model span,.recent-row span{color:var(--muted);font-size:12px;overflow-wrap:anywhere}
    .state{font-family:"IBM Plex Mono",ui-monospace,monospace;font-size:11px;color:var(--red)}
    .state.ok{color:var(--green)}
    .state.warn{color:var(--amber)}
    .recent{display:grid;gap:8px;overflow:auto;max-height:100%}
    .recent-row{display:grid;grid-template-columns:78px 1fr auto;gap:10px;align-items:center;padding:8px 10px}
    .label{font-size:12px;border-radius:999px;padding:5px 8px;background:rgba(102,211,126,.12);color:var(--green);white-space:nowrap}
    .anomalies{display:grid;gap:8px;overflow:auto;max-height:100%}
    .anomaly{border:1px solid var(--line);border-radius:8px;background:rgba(255,255,255,.03);padding:10px}
    .anomaly strong{display:block;margin-bottom:4px}
    .anomaly span{color:var(--muted);font-size:12px;line-height:1.45}
    .anomaly.critical{border-color:rgba(247,111,111,.5);background:rgba(247,111,111,.08)}
    .anomaly.warning{border-color:rgba(241,191,90,.5);background:rgba(241,191,90,.08)}
    .foot{display:flex;justify-content:space-between;gap:12px;color:var(--muted);font-size:12px;margin-top:8px}
    @media(max-width:1200px){.screen{height:auto;min-height:100vh;overflow:visible}.metrics{grid-template-columns:repeat(3,minmax(0,1fr))}.runtime{grid-template-columns:repeat(3,minmax(0,1fr))}.runtime-item{border-bottom:1px solid var(--line)}.grid{grid-template-columns:1fr;grid-template-rows:auto}.grid>*{grid-column:1}.side{grid-template-rows:auto}.models{height:auto}.canvas-wrap{height:320px}.model-side .panel:last-child .canvas-wrap{height:180px}}
    @media(max-width:720px){.screen{padding:12px}.top{display:grid}.clock{text-align:left}.clock-meta{justify-content:flex-start;flex-wrap:wrap}.metrics,.runtime{grid-template-columns:repeat(2,minmax(0,1fr))}.recent-row{grid-template-columns:1fr}.metric strong{font-size:26px}.canvas-wrap{height:260px}}
  </style>
</head>
<body>
  <main class="screen">
    <header class="top">
      <div class="brand">
        <div class="mark">慧</div>
        <div>
          <h1>慧鉴 AI 运营态势大屏</h1>
          <div class="sub">检测增长、模型路由、反馈分布和服务保障集中展示</div>
        </div>
      </div>
      <div class="clock">
        <strong id="clock">--:--:--</strong>
        <div class="clock-meta"><span class="connection" id="connection">正在连接</span><span id="generated">等待数据</span></div>
      </div>
    </header>
    <section class="metrics" id="metrics"></section>
    <section class="runtime" id="runtime"></section>
    <section class="grid">
      <article class="panel trend-panel">
        <div class="panel-head"><h2>24 小时检测趋势</h2><span class="badge">live</span></div>
        <div class="canvas-wrap"><canvas id="trend"></canvas></div>
      </article>
      <div class="side model-side">
        <article class="panel">
          <div class="panel-head"><h2>模型服务状态</h2><span class="badge">routing</span></div>
          <div class="models" id="models"></div>
        </article>
        <article class="panel">
          <div class="panel-head"><h2>路由占比</h2><span class="badge">model runs</span></div>
          <div class="canvas-wrap"><canvas id="routes"></canvas></div>
        </article>
      </div>
      <article class="panel anomaly-panel">
        <div class="panel-head"><h2>异常与风险</h2><span class="badge">anomaly</span></div>
        <div class="anomalies" id="anomalies"></div>
      </article>
      <article class="panel distribution-panel">
        <div class="panel-head"><h2>标签与反馈分布</h2><span class="badge">quality</span></div>
        <div class="canvas-wrap"><canvas id="distribution"></canvas></div>
      </article>
      <article class="panel recent-panel">
        <div class="panel-head"><h2>最新检测流水</h2><span class="badge">recent</span></div>
        <div class="recent" id="recent"></div>
      </article>
    </section>
    <div class="foot"><span>管理员：{{ admin_user.username or admin_user.phone or "admin" }}</span><span><a href="/admin" style="color:inherit">返回后台</a></span></div>
  </main>
  <script>
    const SCREEN_TOKEN = {{ screen_token|default("", true)|tojson }};
    const esc = (v) => String(v ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    const $ = (id) => document.getElementById(id);
    let state = null;
    let lastSuccessAt = 0;
    function setConnection(kind, text){
      $('connection').className = `connection ${kind || ''}`;
      $('connection').textContent = text;
    }
    function tick(){
      const now = new Date();
      $('clock').textContent = now.toLocaleTimeString('zh-CN', {hour12:false});
      if(lastSuccessAt && Date.now() - lastSuccessAt > 70000) setConnection('error', '数据已过期');
    }
    setInterval(tick, 1000); tick();
    async function api(){
      const headers = SCREEN_TOKEN ? {'X-RealGuard-Screen-Token': SCREEN_TOKEN} : {};
      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 12000);
      try{
        const res = await fetch('/api/admin/big-screen', {headers, signal:controller.signal, cache:'no-store', credentials:'same-origin'});
        const data = await res.json();
        if(!res.ok || data.status === 'error') throw new Error(data.message || '大屏数据加载失败');
        return data;
      }catch(err){
        if(err.name === 'AbortError') throw new Error('数据请求超时');
        throw err;
      }finally{
        clearTimeout(timeout);
      }
    }
    function drawCanvas(id, draw){
      const canvas = $(id);
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * ratio));
      canvas.height = Math.max(1, Math.floor(rect.height * ratio));
      const ctx = canvas.getContext('2d');
      ctx.scale(ratio, ratio);
      draw(ctx, rect.width, rect.height);
    }
    function lineChart(ctx, w, h, series){
      const pad = {l:42,r:18,t:18,b:34};
      const labels = series.labels || [];
      const images = series.images || [];
      const videos = series.videos || [];
      const max = Math.max(1, ...images, ...videos);
      ctx.clearRect(0,0,w,h);
      ctx.strokeStyle = '#323b2f'; ctx.lineWidth = 1;
      for(let i=0;i<5;i++){const y=pad.t+(h-pad.t-pad.b)*i/4;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();}
      function path(values,color){
        ctx.beginPath();
        values.forEach((value,i)=>{
          const x = pad.l + (w-pad.l-pad.r) * (labels.length <= 1 ? 0 : i/(labels.length-1));
          const y = h-pad.b - (h-pad.t-pad.b) * value/max;
          if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        });
        ctx.strokeStyle=color;ctx.lineWidth=3;ctx.stroke();
      }
      path(images,'#66d37e'); path(videos,'#3fd5c0');
      ctx.fillStyle='#a8b3a2';ctx.font='12px ui-monospace';
      labels.forEach((label,i)=>{if(i%4===0||i===labels.length-1){const x=pad.l+(w-pad.l-pad.r)*(labels.length<=1?0:i/(labels.length-1));ctx.fillText(label,x-16,h-12);}});
      ctx.fillStyle='#66d37e';ctx.fillText('图像',pad.l,16);
      ctx.fillStyle='#3fd5c0';ctx.fillText('视频',pad.l+48,16);
    }
    function barChart(ctx,w,h,items,colors){
      const pad = {l:92,r:18,t:12,b:18};
      const max = Math.max(1, ...items.map(i=>Number(i.count)||0));
      ctx.clearRect(0,0,w,h);
      ctx.font='12px ui-monospace';
      items.slice(0,8).forEach((item,i)=>{
        const y = pad.t + i * Math.max(24,(h-pad.t-pad.b)/Math.max(8,items.length));
        const barW = (w-pad.l-pad.r) * (Number(item.count)||0) / max;
        ctx.fillStyle='#a8b3a2';ctx.fillText(String(item.label || item.model || '-').slice(0,10),8,y+14);
        ctx.fillStyle=colors[i%colors.length];ctx.fillRect(pad.l,y,Math.max(2,barW),14);
        const count = String(item.count||0);
        const countX = Math.min(pad.l+barW+8, w-pad.r-ctx.measureText(count).width);
        ctx.fillStyle='#f4f7ef';ctx.fillText(count,countX,y+13);
      });
    }
    function renderMetrics(metrics){
      const rows = [
        ['今日新增检测', metrics?.detections?.today, `图像 ${metrics?.detections?.todayImages ?? 0} / 视频 ${metrics?.detections?.todayVideos ?? 0}`],
        ['累计图像检测', metrics?.detections?.images, 'image records'],
        ['累计视频检测', metrics?.detections?.videos, 'video records'],
        ['用户总数', metrics?.users?.total, `今日新增 ${metrics?.users?.todayNew ?? 0}`],
        ['活跃 API 密钥', metrics?.users?.apiKeys, '开发者接入'],
        ['负反馈', metrics?.detections?.feedbackNegative, `正反馈 ${metrics?.detections?.feedbackPositive ?? 0}`],
      ];
      $('metrics').innerHTML = rows.map(([label,value,sub])=>`<article class="metric"><span>${esc(label)}</span><strong>${esc(value ?? '--')}</strong><small>${esc(sub)}</small></article>`).join('');
    }
    function formatBytes(value){
      const bytes = Number(value);
      if(!Number.isFinite(bytes) || bytes <= 0) return '--';
      const units = ['B','KB','MB','GB','TB'];
      const index = Math.min(units.length - 1, Math.floor(Math.log(bytes) / Math.log(1024)));
      return `${(bytes / Math.pow(1024,index)).toFixed(index > 2 ? 1 : 0)} ${units[index]}`;
    }
    function formatDuration(value){
      const seconds = Number(value);
      if(!Number.isFinite(seconds) || seconds < 0) return '--';
      const days = Math.floor(seconds / 86400);
      const hours = Math.floor((seconds % 86400) / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      return days ? `${days}天 ${hours}小时` : hours ? `${hours}小时 ${minutes}分` : `${minutes}分钟`;
    }
    function meterClass(percent, inverse=false){
      if(inverse) return Number(percent) < 50 ? 'critical' : Number(percent) < 100 ? 'warn' : '';
      return Number(percent) >= 95 ? 'critical' : Number(percent) >= 85 ? 'warn' : '';
    }
    function runtimeItem(label, value, detail, percent=null, inverse=false){
      const hasPercent = percent !== null && Number.isFinite(Number(percent));
      const width = hasPercent ? Math.max(0, Math.min(100, Number(percent))) : 0;
      const meter = hasPercent ? `<div class="meter"><i class="${meterClass(percent,inverse)}" style="width:${width}%"></i></div>` : '<div class="meter neutral"></div>';
      return `<div class="runtime-item"><span>${esc(label)} · ${esc(detail)}</span><strong>${esc(value)}</strong>${meter}</div>`;
    }
    function renderRuntime(host, services){
      const cpu = host?.cpu || {};
      const memory = host?.memory || {};
      const disk = host?.disk || {};
      const total = Number(services?.total) || 0;
      const online = Number(services?.online) || 0;
      const servicePercent = total ? online * 100 / total : 0;
      $('runtime').innerHTML = [
        runtimeItem('CPU 负载', `${cpu.loadPercent ?? '--'}%`, `${cpu.cores ?? '--'} 核 · 1m ${cpu.load1 ?? '--'}`, cpu.loadPercent),
        runtimeItem('内存', `${memory.usedPercent ?? '--'}%`, `${formatBytes(memory.usedBytes)} / ${formatBytes(memory.totalBytes)}`, memory.usedPercent),
        runtimeItem('系统盘', `${disk.usedPercent ?? '--'}%`, `${formatBytes(disk.usedBytes)} / ${formatBytes(disk.totalBytes)}`, disk.usedPercent),
        runtimeItem('模型服务', `${online}/${total || '--'} 在线`, `降级 ${services?.degraded ?? 0} · 离线 ${services?.offline ?? 0}`, servicePercent, true),
        runtimeItem('运行时长', formatDuration(host?.uptimeSeconds), `Web 进程 ${formatDuration(host?.processUptimeSeconds)}`),
      ].join('');
    }
    function healthState(model){
      const h = model.health || {};
      if(h.ok) return ['ok','在线'];
      if(h.serviceOk) return ['warn','降级'];
      return ['','故障'];
    }
    function renderModels(models,routing){
      $('models').innerHTML = (models || []).map(m => {
        const [cls,text] = healthState(m);
        const role = routing?.imagePrimary === m.id ? '主路由' : (routing?.imageFallback === m.id ? '兜底' : '');
        return `<div class="model"><div><strong>${esc(m.name || m.id)}</strong><span>${esc(m.id)} ${role ? '· '+role : ''}</span></div><div class="state ${cls}">${text}</div></div>`;
      }).join('') || '<div class="model"><strong>暂无模型</strong><span>等待配置</span></div>';
    }
    function renderRecent(items){
      $('recent').innerHTML = (items || []).map(item => {
        const model = item.modelRoute?.model?.id || '未记录模型';
        return `<div class="recent-row"><strong>#${esc(item.id)}</strong><span>${esc(item.createdAt)} · ${esc(model)}</span><b class="label">${esc(item.label || '-')}</b></div>`;
      }).join('') || '<div class="recent-row"><span>暂无检测记录</span></div>';
    }
    function renderAnomalies(items){
      $('anomalies').innerHTML = (items || []).map(item => `<div class="anomaly ${esc(item.level || '')}"><strong>${esc(item.title || '异常')}</strong><span>${esc(item.message || '')}</span></div>`).join('') || '<div class="anomaly"><strong>当前未发现异常</strong><span>模型、路由和反馈处于可观测范围。</span></div>';
    }
    function renderCharts(){
      if(!state) return;
      drawCanvas('trend',(ctx,w,h)=>lineChart(ctx,w,h,state.series || {}));
      const distribution = [...(state.labels || []), ...(state.feedback || []).map(item=>({label:`反馈 ${item.label}`,count:item.count}))];
      drawCanvas('distribution',(ctx,w,h)=>barChart(ctx,w,h,distribution,['#66d37e','#3fd5c0','#f1bf5a','#f76f6f']));
      drawCanvas('routes',(ctx,w,h)=>barChart(ctx,w,h,state.routes || [],['#3fd5c0','#66d37e','#f1bf5a']));
    }
    async function load(){
      setConnection('', state ? '正在刷新' : '正在连接');
      try{
        state = await api();
        lastSuccessAt = Date.now();
        setConnection('ok', '实时连接');
        $('generated').textContent = `数据时间 ${state.generatedAt || '--'}`;
        renderMetrics(state.metrics);
        renderRuntime(state.host, state.services);
        renderModels(state.models, state.routing);
        renderRecent(state.recent);
        renderAnomalies(state.anomalies);
        renderCharts();
      }catch(err){
        setConnection('error', state ? '刷新失败' : '连接失败');
        $('generated').textContent = state ? `保留上次数据 · ${err.message}` : err.message;
      }
    }
    window.addEventListener('resize', renderCharts);
    load(); setInterval(load, 30000);
  </script>
</body>
</html>
