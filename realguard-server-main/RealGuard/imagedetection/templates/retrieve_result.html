<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>检索结果 - 数字内容鉴伪平台</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="/static/css/font-awesome.min.css" rel="stylesheet">
    <style>
        :root{--primary:#2563eb;--primary-dark:#1d4ed8;--accent:#06d6a0;--purple:#8b5cf6;--warning:#f59e0b;--danger:#ef4444;--bg-body:#f0f2f5;--bg-card:#fff;--bg-nav:rgba(255,255,255,.82);--bg-input:#f1f5f9;--border:#e2e8f0;--border-light:rgba(0,0,0,.06);--text-primary:#0f172a;--text-secondary:#475569;--text-muted:#94a3b8;--shadow-md:0 4px 12px rgba(0,0,0,.08);--shadow-card:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.04)}
        [data-theme="dark"]{--bg-body:#0b0f1a;--bg-card:#151b2e;--bg-nav:rgba(15,23,42,.85);--bg-input:#1e293b;--border:#1e293b;--border-light:rgba(255,255,255,.06);--text-primary:#f1f5f9;--text-secondary:#94a3b8;--text-muted:#64748b;--shadow-md:0 4px 12px rgba(0,0,0,.4);--shadow-card:0 1px 3px rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.15)}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Outfit','Noto Sans SC',sans-serif;background:var(--bg-body);color:var(--text-primary);min-height:100vh;display:flex;flex-direction:column}
        a{text-decoration:none;color:inherit}
        .nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--bg-nav);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-light)}.nav-inner{max-width:1280px;margin:0 auto;padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between}.nav-logo{display:flex;align-items:center;gap:10px;font-size:1.2rem;font-weight:700}.nav-logo i{color:var(--primary);font-size:1.5rem}.nav-links{display:flex;align-items:center;gap:2rem}.nav-links a{font-size:.9rem;font-weight:500;color:var(--text-secondary)}.nav-links a:hover{color:var(--primary)}
        .theme-btn{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--bg-input);border:1px solid var(--border);cursor:pointer;color:var(--text-secondary);font-size:1rem}.theme-btn:hover{background:var(--primary);color:#fff;border-color:var(--primary)}
        .main{flex:1;padding-top:88px;padding-bottom:3rem}.container{max-width:1280px;margin:0 auto;padding:0 2rem}
        .back-link{display:inline-flex;align-items:center;gap:6px;font-size:.85rem;color:var(--text-muted);margin-bottom:1.2rem}.back-link:hover{color:var(--primary)}
        .card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;box-shadow:var(--shadow-card)}
        .card-title{font-size:1.1rem;font-weight:700;margin-bottom:1.2rem;display:flex;align-items:center;gap:8px}.card-title i{color:var(--primary)}

        .query-bar{display:flex;align-items:center;gap:1rem;padding:1rem;border-radius:14px;margin-bottom:1.5rem;border:1px solid var(--border);background:var(--bg-input)}
        .q-thumb{width:72px;height:72px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--bg-input)}.q-thumb img,.q-thumb video{width:100%;height:100%;object-fit:cover;display:block}
        .q-info{flex:1}.q-info .q-title{font-size:.9rem;font-weight:700;margin-bottom:.3rem}.q-info .q-tags{display:flex;gap:6px;flex-wrap:wrap}
        .q-tag{padding:2px 10px;border-radius:99px;font-size:.68rem;font-weight:600;background:var(--bg-card);color:var(--text-muted)}
        .summary{font-size:.82rem;color:var(--text-muted);margin-bottom:1rem}

        .results-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1rem}
        @media(max-width:1200px){.results-grid{grid-template-columns:repeat(4,1fr)}}
        @media(max-width:960px){.results-grid{grid-template-columns:repeat(3,1fr)}}
        @media(max-width:640px){.results-grid{grid-template-columns:repeat(2,1fr)}}

        .r-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .3s}
        .r-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
        .r-thumb{position:relative;height:150px;overflow:hidden;background:var(--bg-input);cursor:pointer}
        .r-thumb img,.r-thumb video{width:100%;height:100%;object-fit:cover;display:block}
        .r-card:hover .r-thumb img,.r-card:hover .r-thumb video{transform:scale(1.05);transition:transform .3s}
        .r-thumb .no-media{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);font-size:.75rem;flex-direction:column;gap:4px}
        .r-thumb .play-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.2)}.r-thumb .play-btn i{font-size:2rem;color:#fff}
        .rank-badge{position:absolute;top:6px;left:6px;width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:#fff}
        .rank-1{background:linear-gradient(135deg,#f59e0b,#d97706)}.rank-2{background:linear-gradient(135deg,#9ca3af,#6b7280)}.rank-3{background:linear-gradient(135deg,#d97706,#92400e)}.rank-n{background:rgba(0,0,0,.4)}
        .r-body{padding:.65rem}
        .r-name{font-size:.72rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:.3rem}
        .r-score{display:flex;justify-content:space-between;font-size:.65rem;margin-bottom:.2rem}.r-score .lbl{color:var(--text-muted)}.r-score .val{color:var(--primary);font-weight:600}
        .score-bar{height:3px;border-radius:2px;background:var(--bg-input);overflow:hidden}.score-fill{height:100%;border-radius:2px;background:var(--primary);transition:width .8s}

        .pagination{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:1.5rem}
        .pg-btn{min-width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);font-size:.78rem;cursor:pointer;font-family:inherit}.pg-btn:hover{border-color:var(--primary);color:var(--primary)}.pg-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}.pg-btn:disabled{opacity:.4;cursor:not-allowed}

        .lightbox{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.88);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}.lightbox.active{opacity:1;pointer-events:auto}
        .lightbox img,.lightbox video{max-width:90vw;max-height:85vh;border-radius:12px}
        .lb-close{position:absolute;top:1.2rem;right:1.2rem;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem}.lb-close:hover{background:rgba(255,255,255,.3)}

        .state-loading{text-align:center;padding:4rem 0}
        .spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem}
        @keyframes spin{to{transform:rotate(360deg)}}
        .state-error{text-align:center;padding:4rem 0;color:var(--text-muted);display:none}.state-error i{font-size:2.5rem;display:block;margin-bottom:1rem;color:var(--danger)}

        .footer{padding:1.5rem 0;background:var(--bg-card);border-top:1px solid var(--border);text-align:center;margin-top:auto}.footer-logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:.4rem;font-size:.95rem;font-weight:700}.footer-logo i{color:var(--primary)}.footer-copy{font-size:.7rem;color:var(--text-muted)}
    </style>
</head>
<body>
<header class="nav"><div class="nav-inner"><a href="/index" class="nav-logo"><i class="fa fa-eye"></i><span>数字内容鉴伪平台</span></a><nav class="nav-links"><a href="/index">首页</a><a href="/introduce">关于我们</a><a href="/profile">我的</a><button class="theme-btn" id="themeToggle"><i class="fa fa-moon-o"></i></button></nav></div></header>

<div class="lightbox" id="lightbox" onclick="closeLB()">
    <div class="lb-close" onclick="closeLB()"><i class="fa fa-times"></i></div>
    <img id="lbImg" style="display:none" onclick="event.stopPropagation()">
    <video id="lbVid" controls style="display:none" onclick="event.stopPropagation()"></video>
</div>

<main class="main"><div class="container">
    <a id="backLink" href="/profile" class="back-link"><i class="fa fa-arrow-left"></i> 返回历史记录</a>
    <div class="card">
        <div class="card-title" id="pageTitle"><i class="fa fa-bar-chart"></i> 检索结果</div>
        <div class="state-loading" id="stLoading"><div class="spinner"></div><p style="color:var(--text-secondary)">正在加载检索结果...</p></div>
        <div class="state-error" id="stError"><i class="fa fa-exclamation-triangle"></i><p id="errMsg">加载失败</p><a href="/profile" style="color:var(--primary);font-weight:600;display:inline-block;margin-top:.8rem"><i class="fa fa-arrow-left"></i> 返回个人中心</a></div>
        <div id="contentWrap" style="display:none">
            <div class="query-bar" id="queryBar"></div>
            <div class="summary" id="summary"></div>
            <div class="results-grid" id="grid"></div>
            <div class="pagination" id="pag"></div>
        </div>
    </div>
</div></main>
<footer class="footer"><div class="footer-logo"><i class="fa fa-eye"></i> 数字内容鉴伪平台</div><p class="footer-copy">&copy; 2025 数字内容鉴伪平台</p></footer>

<script>
(function(){
    /* Theme */
    var body = document.body;
    var themeBtn = document.getElementById('themeToggle');
    var themeIcon = themeBtn.querySelector('i');
    function setTheme(dark) {
        if (dark) { body.setAttribute('data-theme', 'dark'); themeIcon.className = 'fa fa-sun-o'; }
        else { body.removeAttribute('data-theme'); themeIcon.className = 'fa fa-moon-o'; }
    }
    var saved = localStorage.getItem('theme');
    if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme:dark)').matches)) setTheme(true);
    themeBtn.addEventListener('click', function() { var d = body.hasAttribute('data-theme'); setTheme(!d); localStorage.setItem('theme', d ? 'light' : 'dark'); });

    /* Lightbox */
    window.openLB = function(url, isVideo) {
        if (!url) return;
        var limg = document.getElementById('lbImg');
        var lvid = document.getElementById('lbVid');
        if (isVideo) { lvid.src = url; lvid.style.display = 'block'; limg.style.display = 'none'; }
        else { limg.src = url; limg.style.display = 'block'; lvid.style.display = 'none'; lvid.pause(); }
        document.getElementById('lightbox').classList.add('active');
    };
    window.closeLB = function() {
        var lvid = document.getElementById('lbVid');
        document.getElementById('lightbox').classList.remove('active');
        lvid.pause();
        setTimeout(function() { lvid.src = ''; document.getElementById('lbImg').src = ''; }, 300);
    };
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLB(); });

    /* Get itemid */
    var params = new URLSearchParams(window.location.search);
    var itemid = params.get('itemid');
    console.log('[retrieve_result] itemid =', itemid);

    if (!itemid) {
        showError('缺少检索记录ID');
        return;
    }

    /* Fetch */
    var apiUrl = '/history_retrieve/result?itemid=' + encodeURIComponent(itemid);
    console.log('[retrieve_result] fetching', apiUrl);

    fetch(apiUrl)
    .then(function(resp) {
        console.log('[retrieve_result] response status', resp.status);
        return resp.json();
    })
    .then(function(data) {
        console.log('[retrieve_result] data', data);
        if (data.status !== 'success') { showError(data.message || '加载失败'); return; }
        renderAll(data);
    })
    .catch(function(err) {
        console.error('[retrieve_result] fetch error', err);
        showError('请求失败: ' + err.message);
    });

    function showError(msg) {
        document.getElementById('stLoading').style.display = 'none';
        var el = document.getElementById('stError');
        el.style.display = 'block';
        document.getElementById('errMsg').textContent = msg;
    }

    /* State */
    var allResults = [];
    var baseUrl = '';
    var searchType = 'image';
    var currentPage = 1;
    var PER_PAGE = 10;

    function renderAll(data) {
        searchType = data.search_type || 'image';
        var isVideo = (searchType === 'video');

        /* Back link */
        document.getElementById('backLink').href = isVideo ? '/history_video_retrieve' : '/history_image_retrieve';

        /* Title */
        document.getElementById('pageTitle').innerHTML = '<i class="fa fa-' + (isVideo ? 'play-circle' : 'search') + '"></i> ' + (isVideo ? '视频' : '图像') + '检索结果';

        /* Query bar */
        var qb = document.getElementById('queryBar');
        var thumbHtml;
        if (isVideo) {
            thumbHtml = '<div class="q-thumb"><video src="' + esc(data.query_file_url) + '" muted preload="metadata"></video></div>';
        } else {
            thumbHtml = '<div class="q-thumb"><img src="' + esc(data.query_file_url) + '"></div>';
        }
        qb.innerHTML = thumbHtml +
            '<div class="q-info">' +
                '<div class="q-title">' + (isVideo ? '视频' : '图像') + '检索结果</div>' +
                '<div class="q-tags">' +
                    '<span class="q-tag">' + (isVideo ? '以视频搜视频' : '以图搜图') + '</span>' +
                    '<span class="q-tag">' + data.result_count + '条结果</span>' +
                    '<span class="q-tag">' + (data.file_size || '') + '</span>' +
                    '<span class="q-tag">' + (data.createtime || '') + '</span>' +
                '</div>' +
            '</div>';

        /* Summary */
        document.getElementById('summary').textContent = '共找到 ' + data.results.length + ' 条相似' + (isVideo ? '视频' : '图像');

        allResults = data.results || [];
        baseUrl = data.base_url || '';
        currentPage = 1;
        renderPage();

        document.getElementById('stLoading').style.display = 'none';
        document.getElementById('contentWrap').style.display = 'block';
    }

    function isVideoFile(path) {
        return path && /\.(mp4|avi|mov|mkv|flv|wmv)$/i.test(path);
    }

    function renderPage() {
        var total = allResults.length;
        var totalPages = Math.ceil(total / PER_PAGE);
        var start = (currentPage - 1) * PER_PAGE;
        var items = allResults.slice(start, start + PER_PAGE);
        var maxScore = allResults.length > 0 ? allResults[0].score : 1;
        var grid = document.getElementById('grid');
        grid.innerHTML = '';

        for (var i = 0; i < items.length; i++) {
            var item = items[i];
            var product = item.product || {};
            var pImages = product.product_images || '';
            var mediaUrl = pImages ? (baseUrl + pImages) : '';
            var isVid = isVideoFile(pImages) || (searchType === 'video');
            var idParts = (item.id || '').split('/');
            var displayName = idParts[idParts.length - 1] || item.id || '未知';
            var scorePct = maxScore > 0 ? Math.min((item.score / maxScore) * 100, 100) : 0;
            var rank = item.rank || (i + 1);
            var rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-n';

            var card = document.createElement('div');
            card.className = 'r-card';

            var thumbHtml;
            if (mediaUrl) {
                if (isVid) {
                    thumbHtml = '<div class="r-thumb" onclick="openLB(\'' + escAttr(mediaUrl) + '\',true)">' +
                        '<video src="' + escAttr(mediaUrl) + '" preload="metadata" muted onloadeddata="this.currentTime=0.5"></video>' +
                        '<div class="play-btn"><i class="fa fa-play-circle"></i></div>' +
                        '<div class="rank-badge ' + rankClass + '">' + rank + '</div></div>';
                } else {
                    thumbHtml = '<div class="r-thumb" onclick="openLB(\'' + escAttr(mediaUrl) + '\',false)">' +
                        '<img src="' + escAttr(mediaUrl) + '">' +
                        '<div class="rank-badge ' + rankClass + '">' + rank + '</div></div>';
                }
            } else {
                thumbHtml = '<div class="r-thumb"><div class="no-media"><i class="fa fa-' + (isVid ? 'film' : 'picture-o') + '"></i>暂无预览</div>' +
                    '<div class="rank-badge ' + rankClass + '">' + rank + '</div></div>';
            }

            card.innerHTML = thumbHtml +
                '<div class="r-body">' +
                    '<div class="r-name" title="' + escAttr(displayName) + '">' + esc(displayName) + '</div>' +
                    '<div class="r-score"><span class="lbl">相似度</span><span class="val">' + item.score.toFixed(2) + '</span></div>' +
                    '<div class="score-bar"><div class="score-fill" style="width:0%" data-w="' + scorePct.toFixed(1) + '%"></div></div>' +
                '</div>';

            grid.appendChild(card);
        }

        /* Animate bars */
        requestAnimationFrame(function() {
            var fills = grid.querySelectorAll('.score-fill');
            for (var j = 0; j < fills.length; j++) {
                fills[j].style.width = fills[j].getAttribute('data-w');
            }
        });

        /* Pagination */
        var pagEl = document.getElementById('pag');
        pagEl.innerHTML = '';
        if (totalPages <= 1) return;

        addPageBtn(pagEl, '<i class="fa fa-chevron-left"></i>', currentPage > 1, function() { currentPage--; renderPage(); scrollToGrid(); });
        for (var p = 1; p <= totalPages; p++) {
            (function(pg) {
                addPageBtn(pagEl, String(pg), true, function() { currentPage = pg; renderPage(); scrollToGrid(); }, pg === currentPage);
            })(p);
        }
        addPageBtn(pagEl, '<i class="fa fa-chevron-right"></i>', currentPage < totalPages, function() { currentPage++; renderPage(); scrollToGrid(); });
    }

    function addPageBtn(container, html, enabled, onclick, isActive) {
        var btn = document.createElement('button');
        btn.className = 'pg-btn' + (isActive ? ' active' : '');
        btn.innerHTML = html;
        btn.disabled = !enabled;
        btn.onclick = onclick;
        container.appendChild(btn);
    }

    function scrollToGrid() {
        document.getElementById('grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function esc(s) {
        return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
    function escAttr(s) {
        return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
})();
</script>
</body>
</html>
