server {
    listen 80;
    server_name realguard.cn www.realguard.cn;

    client_max_body_size 512m;
    include /etc/nginx/snippets/realguard-security-server.conf;
    include /etc/nginx/snippets/realguard-umami-tracking.conf;

    location = /v2 {
        return 301 /v2/;
    }

    location /v2-api/ {
        include /etc/nginx/snippets/realguard-upload-proxy-security.conf;
        proxy_pass http://127.0.0.1:8848/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location ^~ /v2/ {
        root /var/www;
        try_files $uri $uri/ /v2/index.html;
    }

    location = /admin {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /admin/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(login|register|login_verify|login_sms_verify|password_reset_verify|register_verify|logout)$ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /detection-static/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:15000/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /api/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /sms/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /image_upload/ {
        include /etc/nginx/snippets/realguard-upload-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_read_timeout 180s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /video_upload/ {
        include /etc/nginx/snippets/realguard-upload-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_read_timeout 180s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /retrieve/ {
        include /etc/nginx/snippets/realguard-upload-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_read_timeout 180s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
