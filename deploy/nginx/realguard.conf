server {
    listen 80;
    listen [::]:80;
    server_name rrreal.cn www.rrreal.cn realguard.cn www.realguard.cn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/realguard-frontend;
        default_type text/plain;
        try_files $uri =404;
        access_log off;
    }

    location / {
        return 301 https://www.rrreal.cn$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rrreal.cn;

    ssl_certificate /etc/letsencrypt/live/www.rrreal.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.rrreal.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    return 301 https://www.rrreal.cn$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.rrreal.cn;

    ssl_certificate /etc/letsencrypt/live/www.rrreal.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.rrreal.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 512m;
    include /etc/nginx/snippets/realguard-security-server.conf;
    include /etc/nginx/snippets/realguard-umami-tracking.conf;

    location = /developer/API.md {
        return 404;
    }

    location = /skills/realguard-forensics/SKILL.md {
        return 404;
    }

    location = /v2/skills/realguard-forensics/SKILL.md {
        return 404;
    }

    location = /v2 {
        return 301 /$is_args$args;
    }

    location ^~ /v2/ {
        return 301 /$is_args$args;
    }

    location ~ ^/v2-api/(detect|forensics|provenance)$ {
        include /etc/nginx/snippets/realguard-upload-proxy-security.conf;
        rewrite ^/v2-api/(.*)$ /api/$1 break;
        proxy_pass http://127.0.0.1:8848;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /v2-api/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:8848/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location ^~ /assets/ {
        root /var/www/v2;
        try_files $uri =404;
        access_log off;
        include /etc/nginx/snippets/realguard-security-headers.conf;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /brand/ {
        root /var/www/v2;
        try_files $uri =404;
        access_log off;
        include /etc/nginx/snippets/realguard-security-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
    }

    location = /admin {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /admin/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /detection-static/ {
        return 404;
    }

    location = /api/openapi/v1/image-detections {
        include /etc/nginx/snippets/realguard-upload-proxy-security.conf;
        client_max_body_size 25m;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location /api/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /sms/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /legal {
        return 301 /legal/;
    }

    location /legal/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/image_upload/(detect|detect_async|detect_swarm)$ {
        include /etc/nginx/snippets/realguard-upload-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_read_timeout 180s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /image_upload/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_read_timeout 180s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /video_upload/detect {
        include /etc/nginx/snippets/realguard-upload-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_read_timeout 180s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /video_upload/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_read_timeout 180s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(retrieve|image_retrieve|video_retrieve|history_image_retrieve|history_video_retrieve|history_retrieve|retrieve_result)(/|$) {
        return 404;
    }

    location ^~ /static/uploads/ {
        return 404;
    }

    location /static/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        root /var/www/v2;
        try_files $uri $uri/ /index.html;
        include /etc/nginx/snippets/realguard-security-headers.conf;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }
}
