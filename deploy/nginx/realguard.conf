server {
    listen 80;
    listen [::]:80;
    server_name rrreal.cn www.rrreal.cn realguard.cn www.realguard.cn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/realguard-frontend;
        default_type text/plain;
        try_files $uri =404;
        access_log off;
    }

    location / {
        return 301 https://www.rrreal.cn$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rrreal.cn;

    ssl_certificate /etc/letsencrypt/live/www.rrreal.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.rrreal.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    return 301 https://www.rrreal.cn$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.rrreal.cn;

    ssl_certificate /etc/letsencrypt/live/www.rrreal.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.rrreal.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 512m;
    include /etc/nginx/snippets/realguard-security-server.conf;
    include /etc/nginx/snippets/realguard-umami-tracking.conf;

    location = /developer/API.md {
        return 404;
    }

    location = /skills/realguard-forensics/SKILL.md {
        return 404;
    }

    location = /v2/skills/realguard-forensics/SKILL.md {
        return 404;
    }

    location = /v2 {
        return 301 /v2/;
    }

    location /v2-api/ {
        include /etc/nginx/snippets/realguard-upload-proxy-security.conf;
        proxy_pass http://127.0.0.1:8848/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location ^~ /v2/ {
        root /var/www;
        try_files $uri $uri/ /v2/index.html;
    }

    location = /admin {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /admin/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(login|register|login_verify|login_sms_verify|password_reset_verify|register_verify|logout)$ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /detection-static/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://124.222.3.205/detection-static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /api/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /sms/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /image_upload/ {
        include /etc/nginx/snippets/realguard-upload-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_read_timeout 180s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /video_upload/ {
        include /etc/nginx/snippets/realguard-upload-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_read_timeout 180s;
        proxy_send_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/(retrieve|image_retrieve|video_retrieve|history_image_retrieve|history_video_retrieve|history_retrieve|retrieve_result)(/|$) {
        return 404;
    }

    location /static/ {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        include /etc/nginx/snippets/realguard-api-proxy-security.conf;
        proxy_pass http://127.0.0.1:8081;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header X-XSS-Protection;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header Content-Security-Policy;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
