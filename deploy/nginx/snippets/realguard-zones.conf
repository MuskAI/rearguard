server_tokens off;
set_real_ip_from 127.0.0.1;
real_ip_header X-Real-IP;
real_ip_recursive on;

limit_req_status 429;
limit_conn_status 429;
limit_conn_zone $binary_remote_addr zone=realguard_conn:10m;
limit_req_zone $binary_remote_addr zone=realguard_general:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=realguard_api:10m rate=8r/s;
limit_req_zone $binary_remote_addr zone=realguard_upload:10m rate=30r/m;

