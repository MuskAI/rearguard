# Temporary compatibility entrypoint while rrreal.cn still has an A record for
# the legacy host. The ACME path is forwarded to the canonical server so one
# certificate can be renewed while either address is selected by DNS.
server {
    listen 80;
    listen [::]:80;
    server_name rrreal.cn;

    location ^~ /.well-known/acme-challenge/ {
        proxy_pass http://124.221.92.85;
        proxy_set_header Host rrreal.cn;
        proxy_set_header X-Real-IP $remote_addr;
        access_log off;
    }

    location / {
        return 301 https://www.rrreal.cn$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name rrreal.cn;

    ssl_certificate /etc/letsencrypt/live/www.rrreal.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.rrreal.cn/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000" always;
    return 301 https://www.rrreal.cn$request_uri;
}
