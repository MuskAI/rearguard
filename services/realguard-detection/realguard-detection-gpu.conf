[Service]
EnvironmentFile=-/etc/realguard/model-inference.env
# Expose only physical GPU 1 to this process. Inside the process it is device 0.
Environment=CUDA_VISIBLE_DEVICES=1
Environment=REALGUARD_V2_DEVICE=cuda
Environment=REALGUARD_V2_CUDA_DEVICE_ID=0
Environment=REALGUARD_V2_REQUIRE_CUDA=1
Environment=REALGUARD_V2_EAGER_LOAD=1
Environment=REALGUARD_V2_WARMUP=1
Environment=REALGUARD_V2_WARMUP_VIEWS=26
Environment=REALGUARD_V2_MAX_CONCURRENT_INFERENCES=1
Environment=PYTHONUNBUFFERED=1
