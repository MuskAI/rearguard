[Service]
EnvironmentFile=-/etc/realguard/model-inference.env
# Expose only physical GPU 1 to this process. Inside the process it is device 0.
Environment=CUDA_VISIBLE_DEVICES=1
Environment=REALGUARD_V2_DEVICE=cuda
Environment=REALGUARD_V2_CUDA_DEVICE_ID=0
Environment=REALGUARD_V2_REQUIRE_CUDA=1
Environment=REALGUARD_V2_REQUIRE_MODEL_IDENTITY=1
Environment=REALGUARD_V2_MODEL_REVISION=realguardv2-int8-f907ff5d494e
Environment=REALGUARD_V2_MODEL_SHA256=f907ff5d494eab480022f0586ad4a172f8eecbb02b43ece2de5fa039f5d1ea13
Environment=REALGUARD_V2_RUNTIME_LOCK_PATH=/home/ymk/realguard-detection-releases/current/model/runtime.lock
Environment=REALGUARD_V2_EAGER_LOAD=1
Environment=REALGUARD_V2_WARMUP=1
Environment=REALGUARD_V2_WARMUP_VIEWS=26
Environment=REALGUARD_V2_MAX_CONCURRENT_INFERENCES=2
Environment=REALGUARD_V2_INFERENCE_QUEUE_TIMEOUT_SECONDS=20
Environment=REALGUARD_V2_MAX_SOURCE_PIXELS=24000000
Environment=REALGUARD_V2_MAX_ANALYSIS_SIDE=2048
Environment=REALGUARD_V2_MAX_CHUNKS=64
# Automatic verdicts remain disabled until an independently evaluated,
# Ed25519-signed calibration manifest and its root-owned public key are installed.
Environment=REALGUARD_V2_CALIBRATION_MANIFEST=/etc/realguard/model-calibration.json
Environment=REALGUARD_V2_CALIBRATION_PUBLIC_KEY_FILE=/etc/realguard/model-calibration-ed25519.pub
Environment=REALGUARD_V2_CALIBRATION_REQUIRE_ROOT_OWNERSHIP=1
Environment=REALGUARD_V2_CALIBRATION_MIN_CLASS_SAMPLES=500
Environment=REALGUARD_V2_CALIBRATION_MAX_FPR=0.05
Environment=REALGUARD_V2_CALIBRATION_MAX_FNR=0.10
Environment=PYTHONUNBUFFERED=1
